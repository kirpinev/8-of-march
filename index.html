<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>С 8 Марта! 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose: #f2a7b8;
    --rose-deep: #e07a91;
    --blush: #fce8ee;
    --cream: #fff7f9;
    --sage: #c8d9c0;
    --sage-deep: #a2bda0;
    --text: #5a3a3a;
    --text-light: #a07878;
    --gold: #d4a96a;
  }

  html, body {
    height: 100%;
    font-family: 'Jost', sans-serif;
    background: var(--cream);
    color: var(--text);
    overflow: hidden;
  }

  /* PETALS BACKGROUND */
  .petals {
    position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
  }
  .petal {
    position: absolute;
    width: 10px; height: 14px;
    background: radial-gradient(ellipse at 30% 30%, #f9d0dc, #f2a7b8cc);
    border-radius: 50% 10% 50% 10%;
    opacity: 0;
    animation: fall linear infinite;
  }
  @keyframes fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 0; }
    10% { opacity: 0.7; }
    90% { opacity: 0.4; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }

  /* SCREENS */
  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px 24px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.6s ease, transform 0.6s ease;
    z-index: 10;
  }
  .screen.active { opacity: 1; pointer-events: all; transform: none !important; }
  .screen.exit-left { transform: translateX(-60px); opacity: 0; pointer-events: none; }

  /* SCREEN 1 — WELCOME */
  #screen1 { background: transparent; }

  .logo-flower {
    font-size: 64px;
    line-height: 1;
    margin-bottom: 16px;
    animation: floatBob 3s ease-in-out infinite;
  }
  @keyframes floatBob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  h1.brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(32px, 8vw, 52px);
    font-weight: 300;
    color: var(--rose-deep);
    text-align: center;
    line-height: 1.15;
    margin-bottom: 6px;
    letter-spacing: 0.01em;
  }
  h1.brand em { font-style: italic; color: var(--text); }

  .subtitle {
    font-size: 14px;
    color: var(--text-light);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 40px;
    text-align: center;
  }

  .input-wrap {
    position: relative; width: 100%; max-width: 320px; margin-bottom: 20px;
  }
  .name-input {
    width: 100%;
    background: white;
    border: 1.5px solid var(--rose);
    border-radius: 50px;
    padding: 16px 24px;
    font-family: 'Jost', sans-serif;
    font-size: 16px;
    color: var(--text);
    outline: none;
    text-align: center;
    transition: border-color 0.3s, box-shadow 0.3s;
    box-shadow: 0 4px 20px #f2a7b820;
  }
  .name-input:focus {
    border-color: var(--rose-deep);
    box-shadow: 0 4px 24px #f2a7b840;
  }
  .name-input::placeholder { color: #d4aaaa; }

  .btn-primary {
    background: linear-gradient(135deg, var(--rose), var(--rose-deep));
    color: white;
    border: none;
    border-radius: 50px;
    padding: 16px 48px;
    font-family: 'Jost', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.05em;
    cursor: pointer;
    box-shadow: 0 8px 24px #e07a9140;
    transition: transform 0.2s, box-shadow 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-primary:active { transform: scale(0.96); box-shadow: 0 4px 12px #e07a9130; }

  /* SCREEN 2 — BOUQUETS */
  #screen2 { padding: 20px 16px; }

  .screen2-header {
    text-align: center; margin-bottom: 20px;
  }
  .screen2-header h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(22px, 6vw, 32px);
    font-weight: 300;
    color: var(--rose-deep);
    line-height: 1.3;
  }
  .screen2-header p {
    font-size: 13px; color: var(--text-light); margin-top: 4px; letter-spacing: 0.04em;
  }

  /* TINDER CARD STACK */
  .card-stack {
    position: relative;
    width: min(320px, 88vw);
    height: min(400px, 62vw + 140px);
    margin: 0 auto 20px;
  }

  .bouquet-card {
    position: absolute; inset: 0;
    background: white;
    border-radius: 24px;
    box-shadow: 0 12px 40px #e07a9128;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 28px 24px 24px;
    cursor: grab;
    user-select: none;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    will-change: transform;
    touch-action: none;
  }
  .bouquet-card:active { cursor: grabbing; }

  /* stack visual effect for background cards */
  .bouquet-card.stack-1 { transform: rotate(3deg) translateY(8px) scale(0.97); box-shadow: 0 8px 28px #e07a9118; z-index: 1; }
  .bouquet-card.stack-2 { transform: rotate(-2deg) translateY(14px) scale(0.94); box-shadow: 0 6px 20px #e07a9110; z-index: 0; }
  .bouquet-card.top { z-index: 3; transform: rotate(0deg); }

  .bouquet-card.dragging { transition: none; box-shadow: 0 20px 60px #e07a9138; }
  .bouquet-card.fly-left {
    transition: transform 0.45s cubic-bezier(.4,0,.2,1), opacity 0.45s;
    transform: translateX(-120vw) rotate(-25deg) !important; opacity: 0;
  }
  .bouquet-card.fly-right {
    transition: transform 0.45s cubic-bezier(.4,0,.2,1), opacity 0.45s;
    transform: translateX(120vw) rotate(25deg) !important; opacity: 0;
  }

  .bouquet-emoji { font-size: 80px; line-height: 1; margin-bottom: 12px; }
  .bouquet-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 400;
    color: var(--text); margin-bottom: 6px; text-align: center;
  }
  .bouquet-desc {
    font-size: 12px; color: var(--text-light); text-align: center; line-height: 1.5; letter-spacing: 0.02em;
  }

  /* like/nope overlay */
  .stamp {
    position: absolute; top: 28px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px; font-weight: 400;
    border: 3px solid;
    padding: 4px 14px;
    border-radius: 8px;
    opacity: 0;
    transition: opacity 0.15s;
    pointer-events: none;
  }
  .stamp-like { right: 20px; color: var(--sage-deep); border-color: var(--sage-deep); transform: rotate(15deg); }
  .stamp-nope { left: 20px; color: var(--rose-deep); border-color: var(--rose-deep); transform: rotate(-15deg); }

  /* action buttons */
  .action-btns {
    display: flex; gap: 20px; align-items: center; justify-content: center;
  }
  .btn-action {
    width: 56px; height: 56px;
    border-radius: 50%; border: none;
    font-size: 24px;
    cursor: pointer;
    box-shadow: 0 6px 20px #0001;
    transition: transform 0.2s, box-shadow 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-action:active { transform: scale(0.9); }
  .btn-skip { background: white; color: var(--rose-deep); box-shadow: 0 6px 20px #e07a9128; }
  .btn-like { background: linear-gradient(135deg, var(--sage), var(--sage-deep)); color: white; box-shadow: 0 6px 20px #a2bda040; }

  .hint-swipe {
    font-size: 11px; color: var(--text-light); letter-spacing: 0.04em;
    text-align: center; margin-bottom: 14px;
  }

  /* SCREEN 3 — GIFT */
  #screen3 { background: transparent; }

  .gift-wrap {
    background: white;
    border-radius: 28px;
    padding: 36px 28px;
    max-width: 340px; width: 100%;
    box-shadow: 0 16px 60px #e07a9120;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .gift-wrap::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, var(--rose), var(--sage), var(--rose));
  }

  .confetti-burst {
    font-size: 40px; margin-bottom: 8px;
    animation: pop 0.5s cubic-bezier(.36,1.56,.64,1) both;
  }
  @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }

  .gift-greeting {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(18px, 5vw, 24px);
    font-weight: 300; color: var(--text-light);
    margin-bottom: 4px; line-height: 1.4;
  }
  .gift-name-display {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(28px, 8vw, 40px);
    font-weight: 400; color: var(--rose-deep);
    margin-bottom: 20px;
  }

  .cert-card {
    background: linear-gradient(135deg, #fff0f5, #fce8f0);
    border: 1.5px solid var(--rose);
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .cert-logo { font-size: 36px; margin-bottom: 8px; }
  .cert-store {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 400;
    color: var(--text); margin-bottom: 4px;
  }
  .cert-label {
    font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-light);
  }

  .gift-poem {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px; font-style: italic;
    color: var(--text-light); line-height: 1.7;
    margin-bottom: 20px;
  }

  .cert-link {
    display: inline-block;
    background: linear-gradient(135deg, var(--rose), var(--rose-deep));
    color: white;
    text-decoration: none;
    border-radius: 50px;
    padding: 14px 36px;
    font-family: 'Jost', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.05em;
    box-shadow: 0 8px 24px #e07a9140;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .cert-link:active { transform: scale(0.96); }

  .btn-restart {
    background: none; border: 1.5px solid var(--rose);
    color: var(--rose-deep); border-radius: 50px;
    padding: 12px 32px; font-family: 'Jost', sans-serif;
    font-size: 13px; letter-spacing: 0.05em;
    cursor: pointer; transition: background 0.2s;
  }
  .btn-restart:active { background: var(--blush); }

  /* decorative corners */
  .deco { position: fixed; pointer-events: none; z-index: 1; opacity: 0.5; font-size: 32px; }
  .deco-tl { top: 12px; left: 12px; }
  .deco-tr { top: 12px; right: 12px; transform: scaleX(-1); }
  .deco-bl { bottom: 12px; left: 12px; transform: scaleY(-1); }
  .deco-br { bottom: 12px; right: 12px; transform: scale(-1); }
</style>
</head>
<body>

<!-- FALLING PETALS -->
<div class="petals" id="petals"></div>

<!-- DECORATIVE CORNERS -->
<div class="deco deco-tl">🌸</div>
<div class="deco deco-tr">🌸</div>
<div class="deco deco-bl">🌿</div>
<div class="deco deco-br">🌿</div>

<!-- SCREEN 1: WELCOME -->
<div class="screen active" id="screen1">
  <div class="logo-flower">🌷</div>
  <h1 class="brand">С <em>8 марта</em>,<br>дорогая коллега!</h1>
  <p class="subtitle">маленький подарок от команды</p>
  <div class="input-wrap">
    <input class="name-input" id="nameInput" type="text" placeholder="Введи своё имя" maxlength="30" autocomplete="off">
  </div>
  <button class="btn-primary" onclick="startJourney()">Открыть подарок 🎁</button>
</div>

<!-- SCREEN 2: BOUQUETS -->
<div class="screen" id="screen2" style="transform: translateX(60px)">
  <div class="screen2-header">
    <h2 id="chooseTitle">Выбери свой букет</h2>
    <p>Свайпай вправо ❤️ или влево ✕</p>
  </div>

  <div class="card-stack" id="cardStack"></div>

  <p class="hint-swipe">или нажми кнопки ниже</p>
  <div class="action-btns">
    <button class="btn-action btn-skip" onclick="swipeCard('left')" title="Следующий">✕</button>
    <button class="btn-action btn-like" onclick="swipeCard('right')" title="Выбрать">♡</button>
  </div>
</div>

<!-- SCREEN 3: GIFT -->
<div class="screen" id="screen3" style="transform: translateX(60px)">
  <div class="gift-wrap" id="giftWrap">
    <div class="confetti-burst" id="giftEmoji">🎉</div>
    <div class="gift-greeting">Поздравляем,</div>
    <div class="gift-name-display" id="giftName"></div>
    <div class="cert-card">
      <div class="cert-logo" id="certLogo"></div>
      <div class="cert-store" id="certStore"></div>
      <div class="cert-label">Сертификат в подарок</div>
    </div>
    <div class="gift-poem" id="giftPoem" style="white-space: pre-line;"></div>

  </div>
</div>

<script>
// DATA
// ============================================================
//  СЕРТИФИКАТЫ — вставь сюда реальные номера перед запуском
//  Каждой пользователю выдаётся следующий по порядку номер.
//  Формат: просто строки, например '1234-5678-ABCD'
// ============================================================
const CERTIFICATES = [
  'https://ga.gift/ru/6ed7c2c36bb04765a50ee72428114ef0',
  'https://ga.gift/ru/b59403c48375449d8c4ea4ce66fdb9b2',
  'https://ga.gift/ru/2259dafc3fc24323b6c5c6c433a96f52',
  'https://ga.gift/ru/9830aa84b46e4466befca7a083cce2a7',
  'https://ga.gift/ru/546cc7f2ca0a4c00a95621073249b0a7',
  'https://ga.gift/ru/fd76165807584d3793f36fab581fabac',
  'https://ga.gift/ru/f3c18dc40cb14fdf926aa021abdba8bc',
  'https://ga.gift/ru/bc9cee6375f643c8a016c631dcb76e67',
  'https://ga.gift/ru/77b7866cafde4d09a7b8584ca794846e',
  'https://ga.gift/ru/c591df09b7944c7dafe924a4bcaaee26',
  'https://ga.gift/ru/47cf2271c94d44088cab589ce1000d6c',
  'https://ga.gift/ru/9b86dddb78a84c11a47369230a0aa94a',
  'https://ga.gift/ru/38d8ebe8967a42f693d8729b3a7d58e5',
  'https://ga.gift/ru/52577523b78c47d9b351eaf4090c36c5',
  'https://ga.gift/ru/d707d58b1f3e4e2a8dc69da8a9dce757',
  'https://ga.gift/ru/d6a80619152a4ab58f77c1e1aff3eea2',
  'https://ga.gift/ru/cb2dc00be24743019d564c273e954f2c',
  'https://ga.gift/ru/80e01cd1994444e7a0e832c70f5bb083',
  'https://ga.gift/ru/68157f175f6b4805a2d6ceb19616d426',
  'https://ga.gift/ru/07681d81b12f437f94f332292dce8dd2',
  'https://ga.gift/ru/1cd43353e931438da2e86d45be07f5ae',
  'https://ga.gift/ru/1c14ac2263ff45f3b0bf5a3a914e9cde',
  'https://ga.gift/ru/66e1da1b946044d3a39d6a233dd78220',
];

const LS_KEY = 'march8_cert_idx'; // ключ хранения счётчика

// ============================================================
//  БУКЕТЫ (8 штук — бесконечная прокрутка по кругу)
// ============================================================
const bouquets = [
  { id: 0, emoji: '🌹', name: 'Алые розы',       desc: 'Страстные, классические,\nбез лишних слов' },
  { id: 1, emoji: '🌸', name: 'Сакура',           desc: 'Нежная, воздушная,\nкак весеннее утро' },
  { id: 2, emoji: '🌻', name: 'Подсолнухи',       desc: 'Солнечные, тёплые,\nзаряжают энергией' },
  { id: 3, emoji: '💐', name: 'Луговые цветы',    desc: 'Свободные, живые,\nпахнут лугом и счастьем' },
  { id: 4, emoji: '🌷', name: 'Тюльпаны',         desc: 'Весенние, свежие,\nпервый глоток тепла' },
  { id: 5, emoji: '🌺', name: 'Гибискус',         desc: 'Экзотические, смелые,\nяркие как ты сама' },
  { id: 6, emoji: '🪷', name: 'Лотос',            desc: 'Спокойные, глубокие,\nс душой востока' },
  { id: 7, emoji: '🌼', name: 'Ромашки',          desc: 'Простые, душевные,\nкак солнечный день' },
];

// бесконечная очередь — перетасованная копия, при исчерпании добавляем ещё
let cardQueue = [];
let userName = '';
let isDragging = false;
let startX = 0, startY = 0, currentX = 0;
let activeCard = null;

// ============================================================
//  PETALS
// ============================================================
(function() {
  const container = document.getElementById('petals');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.style.cssText = `
      left: ${Math.random() * 100}%;
      width: ${6 + Math.random() * 8}px;
      height: ${8 + Math.random() * 10}px;
      animation-duration: ${5 + Math.random() * 8}s;
      animation-delay: ${Math.random() * 10}s;
      opacity: 0;
      transform: rotate(${Math.random() * 360}deg);
    `;
    container.appendChild(p);
  }
})();

// ============================================================
//  ПЕРЕХОД МЕЖДУ ЭКРАНАМИ
// ============================================================
function goTo(screenId) {
  document.querySelectorAll('.screen').forEach(s => {
    if (s.id !== screenId) { s.classList.remove('active'); s.classList.add('exit-left'); }
  });
  const target = document.getElementById(screenId);
  target.style.transform = 'translateX(60px)';
  target.classList.remove('exit-left');
  requestAnimationFrame(() => {
    target.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
    requestAnimationFrame(() => { target.classList.add('active'); });
  });
}

// ============================================================
//  ЭКРАН 1 → 2
// ============================================================
function startJourney() {
  const input = document.getElementById('nameInput');
  userName = input.value.trim();
  if (!userName) {
    input.focus(); input.style.borderColor = '#e07a91';
    setTimeout(() => input.style.borderColor = '', 1000); return;
  }
  // Проверяем — не получала ли эта сессия уже сертификат
  if (localStorage.getItem('march8_got')) {
    showAlreadyGot(); return;
  }
  document.getElementById('chooseTitle').textContent = `${userName}, выбери букет!`;
  initQueue();
  buildVisibleStack();
  goTo('screen2');
}

document.getElementById('nameInput').addEventListener('keydown', e => { if (e.key === 'Enter') startJourney(); });

// ============================================================
//  БЕСКОНЕЧНАЯ ОЧЕРЕДЬ
// ============================================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initQueue() {
  cardQueue = shuffle(bouquets);
}

function refillQueue() {
  // добавляем новую перетасованную порцию, избегая повтора верхней карты
  const extra = shuffle(bouquets);
  // чтобы верхняя следующая не совпала с последней добавленной
  if (cardQueue.length > 0 && extra[0].id === cardQueue[cardQueue.length - 1].id) {
    extra.push(extra.shift());
  }
  cardQueue = cardQueue.concat(extra);
}

// ============================================================
//  СТРОИМ СТОПКУ (всегда держим 3 карточки в DOM)
// ============================================================
function buildVisibleStack() {
  const stack = document.getElementById('cardStack');
  stack.innerHTML = '';
  ensureQueue(3);
  // рисуем 3 карты: индекс 0 = верхняя (top), 1 = stack-1, 2 = stack-2
  for (let i = 2; i >= 0; i--) {
    const card = createCard(cardQueue[i], i);
    stack.appendChild(card);
  }
  attachDrag();
}

function ensureQueue(need) {
  while (cardQueue.length < need) refillQueue();
}

function createCard(b, stackPos) {
  const div = document.createElement('div');
  div.className = 'bouquet-card';
  div.dataset.id = b.id;
  if (stackPos === 0) div.classList.add('top');
  else if (stackPos === 1) div.classList.add('stack-1');
  else div.classList.add('stack-2');
  div.innerHTML = `
    <div class="stamp stamp-like">люблю ♡</div>
    <div class="stamp stamp-nope">дальше</div>
    <div class="bouquet-emoji">${b.emoji}</div>
    <div class="bouquet-name">${b.name}</div>
    <div class="bouquet-desc">${b.desc.replace('\n', '<br>')}</div>
  `;
  return div;
}

// ============================================================
//  DRAG
// ============================================================
function attachDrag() {
  const stack = document.getElementById('cardStack');
  const topCard = stack.querySelector('.top');
  if (!topCard) return;
  topCard.addEventListener('touchstart', onDragStart, { passive: true });
  topCard.addEventListener('mousedown', onDragStart);
}

function onDragStart(e) {
  isDragging = true;
  activeCard = e.currentTarget;
  startX = e.touches ? e.touches[0].clientX : e.clientX;
  startY = e.touches ? e.touches[0].clientY : e.clientY;
  activeCard.classList.add('dragging');
  document.addEventListener('touchmove', onDragMove, { passive: false });
  document.addEventListener('touchend', onDragEnd);
  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup', onDragEnd);
}

function onDragMove(e) {
  if (!isDragging || !activeCard) return;
  e.preventDefault && e.preventDefault();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  currentX = cx - startX;
  const cy = (e.touches ? e.touches[0].clientY : e.clientY) - startY;
  activeCard.style.transform = `translate(${currentX}px, ${cy * 0.3}px) rotate(${currentX * 0.08}deg)`;
  const like = activeCard.querySelector('.stamp-like');
  const nope = activeCard.querySelector('.stamp-nope');
  const ratio = Math.abs(currentX) / 80;
  if (currentX > 20)       { like.style.opacity = Math.min(ratio, 1); nope.style.opacity = 0; }
  else if (currentX < -20) { nope.style.opacity = Math.min(ratio, 1); like.style.opacity = 0; }
  else                     { like.style.opacity = 0; nope.style.opacity = 0; }
}

function onDragEnd() {
  if (!isDragging) return;
  isDragging = false;
  document.removeEventListener('touchmove', onDragMove);
  document.removeEventListener('touchend', onDragEnd);
  document.removeEventListener('mousemove', onDragMove);
  document.removeEventListener('mouseup', onDragEnd);
  if (Math.abs(currentX) > 80) {
    swipeCard(currentX > 0 ? 'right' : 'left', activeCard);
  } else {
    activeCard.style.transition = 'transform 0.4s cubic-bezier(.36,1.56,.64,1)';
    activeCard.style.transform = '';
    activeCard.querySelector('.stamp-like').style.opacity = 0;
    activeCard.querySelector('.stamp-nope').style.opacity = 0;
    setTimeout(() => { if (activeCard) activeCard.style.transition = ''; }, 400);
    activeCard.classList.remove('dragging');
  }
  currentX = 0; activeCard = null;
}

// ============================================================
//  СВАЙП
// ============================================================
function swipeCard(direction, card) {
  const stack = document.getElementById('cardStack');
  const topCard = card || stack.querySelector('.top');
  if (!topCard) return;
  topCard.classList.remove('dragging');

  if (direction === 'right') {
    topCard.classList.add('fly-right');
    setTimeout(() => showGift(topCard.dataset.id), 400);
  } else {
    topCard.classList.add('fly-left');
    setTimeout(() => {
      cardQueue.shift(); // убираем использованную карту из очереди
      rebuildStack();    // перерисовываем стопку из актуальной очереди
    }, 450);
  }
}

// Полностью перестраиваем стопку из cardQueue — исключает любые баги с DOM-порядком
function rebuildStack() {
  const stack = document.getElementById('cardStack');
  stack.innerHTML = '';
  ensureQueue(3);
  // i=0 → top (верхняя), i=1 → stack-1, i=2 → stack-2
  // appendChild снизу вверх: последний добавленный окажется сверху по z-index
  for (let i = 2; i >= 0; i--) {
    stack.appendChild(createCard(cardQueue[i], i));
  }
  attachDrag();
}

// ============================================================
//  ПОКАЗ ПОДАРКА
// ============================================================
function showGift(bouquetId) {
  const chosen = bouquets.find(b => b.id == bouquetId);

  // Получаем следующий сертификат по порядку
  let idx = parseInt(localStorage.getItem(LS_KEY) || '0');
  let certCode = null;
  if (idx < CERTIFICATES.length) {
    certCode = CERTIFICATES[idx];
    localStorage.setItem(LS_KEY, idx + 1);
    localStorage.setItem('march8_got', '1');
  }

  document.getElementById('giftName').textContent = userName;
  document.getElementById('giftEmoji').textContent = chosen.emoji + ' 🎁';
  document.getElementById('certLogo').textContent = '🍎';
  document.getElementById('certStore').textContent = 'Золотое Яблоко';

  if (certCode) {
    document.getElementById('giftPoem').innerHTML =
      `С праздником весны! 🌸<br><br><a href="${certCode}" target="_blank" class="cert-link">Открыть сертификат →</a>`;
  } else {
    document.getElementById('giftPoem').textContent =
      'К сожалению, все сертификаты уже разобрали 🌷\nОбратись к организатору — он поможет!';
  }

  goTo('screen3');
}

// ============================================================
//  УЖЕ ПОЛУЧАЛА
// ============================================================
function showAlreadyGot() {
  document.getElementById('giftName').textContent = userName;
  document.getElementById('giftEmoji').textContent = '🌷';
  document.getElementById('certLogo').textContent = '💝';
  document.getElementById('certStore').textContent = 'Подарок уже получен';
  document.getElementById('giftPoem').textContent =
    'Ты уже открывала этот подарок!\nОдин сертификат в одни руки 😊\nС 8 Марта!';
  goTo('screen3');
}
