<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>С 8 Марта! 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --rose: #f2a7b8; --rose-deep: #e07a91; --blush: #fce8ee; --cream: #fff7f9;
    --sage: #c8d9c0; --sage-deep: #a2bda0; --text: #5a3a3a; --text-light: #a07878;
  }
  html, body { height: 100%; font-family: 'Jost', sans-serif; background: var(--cream); color: var(--text); overflow: hidden; }
  .petals { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .petal { position: absolute; width: 10px; height: 14px; background: radial-gradient(ellipse at 30% 30%, #f9d0dc, #f2a7b8cc); border-radius: 50% 10% 50% 10%; opacity: 0; animation: fall linear infinite; }
  @keyframes fall { 0% { transform: translateY(-20px) rotate(0deg); opacity: 0; } 10% { opacity: 0.7; } 90% { opacity: 0.4; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
  .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; opacity: 0; pointer-events: none; transition: opacity 0.6s ease, transform 0.6s ease; z-index: 10; }
  .screen.active { opacity: 1; pointer-events: all; transform: none !important; }
  .screen.exit-left { transform: translateX(-60px); opacity: 0; pointer-events: none; }
  .logo-flower { font-size: 64px; line-height: 1; margin-bottom: 16px; animation: floatBob 3s ease-in-out infinite; }
  @keyframes floatBob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  h1.brand { font-family: 'Cormorant Garamond', serif; font-size: clamp(32px, 8vw, 52px); font-weight: 300; color: var(--rose-deep); text-align: center; line-height: 1.15; margin-bottom: 6px; letter-spacing: 0.01em; }
  h1.brand em { font-style: italic; color: var(--text); }
  .subtitle { font-size: 14px; color: var(--text-light); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 40px; text-align: center; }
  .input-wrap { position: relative; width: 100%; max-width: 320px; margin-bottom: 20px; }
  .name-input { width: 100%; background: white; border: 1.5px solid var(--rose); border-radius: 50px; padding: 16px 24px; font-family: 'Jost', sans-serif; font-size: 16px; color: var(--text); outline: none; text-align: center; transition: border-color 0.3s, box-shadow 0.3s; box-shadow: 0 4px 20px #f2a7b820; }
  .name-input:focus { border-color: var(--rose-deep); box-shadow: 0 4px 24px #f2a7b840; }
  .name-input::placeholder { color: #d4aaaa; }
  .btn-primary { background: linear-gradient(135deg, var(--rose), var(--rose-deep)); color: white; border: none; border-radius: 50px; padding: 16px 48px; font-family: 'Jost', sans-serif; font-size: 15px; font-weight: 500; letter-spacing: 0.05em; cursor: pointer; box-shadow: 0 8px 24px #e07a9140; transition: transform 0.2s, box-shadow 0.2s; -webkit-tap-highlight-color: transparent; }
  .btn-primary:active { transform: scale(0.96); box-shadow: 0 4px 12px #e07a9130; }
  #screen2 { padding: 20px 16px; }
  .screen2-header { text-align: center; margin-bottom: 20px; }
  .screen2-header h2 { font-family: 'Cormorant Garamond', serif; font-size: clamp(22px, 6vw, 32px); font-weight: 300; color: var(--rose-deep); line-height: 1.3; }
  .screen2-header p { font-size: 13px; color: var(--text-light); margin-top: 4px; letter-spacing: 0.04em; }
  .card-stack { position: relative; width: min(320px, 88vw); height: min(400px, 62vw + 140px); margin: 0 auto 20px; }
  .bouquet-card { position: absolute; inset: 0; background: white; border-radius: 24px; box-shadow: 0 12px 40px #e07a9128; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 28px 24px 24px; cursor: grab; user-select: none; transition: transform 0.15s ease, box-shadow 0.15s ease; will-change: transform; touch-action: none; }
  .bouquet-card:active { cursor: grabbing; }
  .bouquet-card.stack-1 { transform: rotate(3deg) translateY(8px) scale(0.97); box-shadow: 0 8px 28px #e07a9118; z-index: 1; }
  .bouquet-card.stack-2 { transform: rotate(-2deg) translateY(14px) scale(0.94); box-shadow: 0 6px 20px #e07a9110; z-index: 0; }
  .bouquet-card.top { z-index: 3; transform: rotate(0deg); }
  .bouquet-card.dragging { transition: none; box-shadow: 0 20px 60px #e07a9138; }
  .bouquet-card.fly-left { transition: transform 0.45s cubic-bezier(.4,0,.2,1), opacity 0.45s; transform: translateX(-120vw) rotate(-25deg) !important; opacity: 0; }
  .bouquet-card.fly-right { transition: transform 0.45s cubic-bezier(.4,0,.2,1), opacity 0.45s; transform: translateX(120vw) rotate(25deg) !important; opacity: 0; }
  .bouquet-emoji { font-size: 80px; line-height: 1; margin-bottom: 12px; }
  .bouquet-name { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400; color: var(--text); margin-bottom: 6px; text-align: center; }
  .bouquet-desc { font-size: 12px; color: var(--text-light); text-align: center; line-height: 1.5; letter-spacing: 0.02em; }
  .stamp { position: absolute; top: 28px; font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 400; border: 3px solid; padding: 4px 14px; border-radius: 8px; opacity: 0; transition: opacity 0.15s; pointer-events: none; }
  .stamp-like { right: 20px; color: var(--sage-deep); border-color: var(--sage-deep); transform: rotate(15deg); }
  .stamp-nope { left: 20px; color: var(--rose-deep); border-color: var(--rose-deep); transform: rotate(-15deg); }
  .action-btns { display: flex; gap: 20px; align-items: center; justify-content: center; }
  .btn-action { width: 56px; height: 56px; border-radius: 50%; border: none; font-size: 24px; cursor: pointer; box-shadow: 0 6px 20px #0001; transition: transform 0.2s, box-shadow 0.2s; -webkit-tap-highlight-color: transparent; }
  .btn-action:active { transform: scale(0.9); }
  .btn-skip { background: white; color: var(--rose-deep); box-shadow: 0 6px 20px #e07a9128; }
  .btn-like { background: linear-gradient(135deg, var(--sage), var(--sage-deep)); color: white; box-shadow: 0 6px 20px #a2bda040; }
  .hint-swipe { font-size: 11px; color: var(--text-light); letter-spacing: 0.04em; text-align: center; margin-bottom: 14px; }
  #screen3 { background: transparent; }
  .gift-wrap { background: white; border-radius: 28px; padding: 36px 28px; max-width: 340px; width: 100%; box-shadow: 0 16px 60px #e07a9120; text-align: center; position: relative; overflow: hidden; }
  .gift-wrap::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--rose), var(--sage), var(--rose)); }
  .confetti-burst { font-size: 40px; margin-bottom: 8px; animation: pop 0.5s cubic-bezier(.36,1.56,.64,1) both; }
  @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
  .gift-greeting { font-family: 'Cormorant Garamond', serif; font-size: clamp(18px, 5vw, 24px); font-weight: 300; color: var(--text-light); margin-bottom: 4px; line-height: 1.4; }
  .gift-name-display { font-family: 'Cormorant Garamond', serif; font-size: clamp(28px, 8vw, 40px); font-weight: 400; color: var(--rose-deep); margin-bottom: 20px; }
  .cert-card { background: linear-gradient(135deg, #fff0f5, #fce8f0); border: 1.5px solid var(--rose); border-radius: 18px; padding: 20px; margin-bottom: 20px; }
  .cert-logo { font-size: 36px; margin-bottom: 8px; }
  .cert-store { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400; color: var(--text); margin-bottom: 4px; }
  .cert-label { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-light); }
  .cert-link { display: inline-block; background: linear-gradient(135deg, var(--rose), var(--rose-deep)); color: white; text-decoration: none; border-radius: 50px; padding: 14px 36px; font-family: 'Jost', sans-serif; font-size: 15px; font-weight: 500; letter-spacing: 0.05em; box-shadow: 0 8px 24px #e07a9140; transition: transform 0.2s, box-shadow 0.2s; margin-top: 8px; }
  .cert-link:active { transform: scale(0.96); }
  .gift-poem { font-family: 'Cormorant Garamond', serif; font-size: 14px; font-style: italic; color: var(--text-light); line-height: 1.7; margin-bottom: 20px; white-space: pre-line; }
  .deco { position: fixed; pointer-events: none; z-index: 1; opacity: 0.5; font-size: 32px; }
  .deco-tl { top: 12px; left: 12px; }
  .deco-tr { top: 12px; right: 12px; transform: scaleX(-1); }
  .deco-bl { bottom: 12px; left: 12px; transform: scaleY(-1); }
  .deco-br { bottom: 12px; right: 12px; transform: scale(-1); }
</style>
</head>
<body>

<div class="petals" id="petals"></div>
<div class="deco deco-tl">🌸</div>
<div class="deco deco-tr">🌸</div>
<div class="deco deco-bl">🌿</div>
<div class="deco deco-br">🌿</div>

<div class="screen active" id="screen1">
  <div class="logo-flower">🌷</div>
  <h1 class="brand">С <em>8 марта</em>,<br>дорогая коллега!</h1>
  <p class="subtitle">маленький подарок от команды</p>
  <div class="input-wrap">
    <input class="name-input" id="nameInput" type="text" placeholder="Введи своё имя" maxlength="30" autocomplete="off">
  </div>
  <button class="btn-primary" onclick="startJourney()">Открыть подарок 🎁</button>
</div>

<div class="screen" id="screen2" style="transform: translateX(60px)">
  <div class="screen2-header">
    <h2 id="chooseTitle">Выбери свой букет</h2>
    <p>Свайпай вправо ❤️ или влево ✕</p>
  </div>
  <div class="card-stack" id="cardStack"></div>
  <p class="hint-swipe">или нажми кнопки ниже</p>
  <div class="action-btns">
    <button class="btn-action btn-skip" onclick="swipeCard('left')">✕</button>
    <button class="btn-action btn-like" onclick="swipeCard('right')">♡</button>
  </div>
</div>

<div class="screen" id="screen3" style="transform: translateX(60px)">
  <div class="gift-wrap">
    <div class="confetti-burst" id="giftEmoji">🎉</div>
    <div class="gift-greeting">Поздравляем,</div>
    <div class="gift-name-display" id="giftName"></div>
    <div class="cert-card">
      <div class="cert-logo" id="certLogo"></div>
      <div class="cert-store" id="certStore"></div>
      <div class="cert-label">Сертификат в подарок</div>
    </div>
    <div class="gift-poem" id="giftPoem"></div>
  </div>
</div>

<script>
(function() {
  // XOR decoder
  var _k = 77;
  function _d(s) {
    var b = atob(s), r = '';
    for (var i = 0; i < b.length; i++) r += String.fromCharCode(b.charCodeAt(i) ^ _k);
    return r;
  }

  // Зашифрованные ссылки на сертификаты
  var CERTIFICATES = [
  "JTk5PT53YmIqLGMqJCs5Yj84YnsoKXoufy5+ey8vfXl6e3gseH0oKHp/eX91fHx5KCt9",
  "JTk5PT53YmIqLGMqJCs5Yj84Yi94dHl9fi55dX56eHl5dCl1LnkoLHkuKHt7KykvdC9/",
  "JTk5PT53YmIqLGMqJCs5Yj84Yn9/eHQpLCsufisuf3l+f34vey54LnsueX5+LHR7K3h/",
  "JTk5PT53YmIqLGMqJCs5Yj84YnR1fn0sLHV5L3l7KHl5e3svKCsuLHosfXV+Li4ofyx6",
  "JTk5PT53YmIqLGMqJCs5Yj84Ynh5ey4ueit/Lix9LHkufX0sdHh7f3x9en5/eXQvfSx6",
  "JTk5PT53YmIqLGMqJCs5Yj84Yispent8e3h1fXp4dXkpfnp0fit+eyssL3h1fCssLywu",
  "JTk5PT53YmIqLGMqJCs5Yj84Yit+Lnx1KS55fS4vfHkrKSt0f3ssLH1/fCwvKS8sdS8u",
  "JTk5PT53YmIqLGMqJCs5Yj84Yi8udC4oKHt+engre3l+LnUsfXx7Lnt+fCkuL3p7KHt6",
  "JTk5PT53YmIqLGMqJCs5Yj84Ynp6L3p1e3suLCspKHkpfXQsei91eHV5Lix6dHl1eXso",
  "JTk5PT53YmIqLGMqJCs5Yj84Yi54dHwpK310L3p0eXkueiksKyh0f3kseS8uLCwoKH97",
  "JTk5PT53YmIqLGMqJCs5Yj84Ynl6Lit/f3p8LnR5KXl5fXV1LiwveHV0Lih8fX19KXsu",
  "JTk5PT53YmIqLGMqJCs5Yj84YnQvdXspKSkvenUsdXkufHwseXp+e3R/fn0sfSwsdHks",
  "JTk5PT53YmIqLGMqJCs5Yj84Yn51KXUoLyh1dHt6LHl/K3t0fil1en90L34seil4dSh4",
  "JTk5PT53YmIqLGMqJCs5Yj84Ynh/eHp6eH9+L3p1Lnl6KXQvfnh8KCwreX10fS5+ey54",
  "JTk5PT53YmIqLGMqJCs5Yj84Yil6fXopeHUvfCt+KHkofyx1KS57dCksdSx0KS4oenh6",
  "JTk5PT53YmIqLGMqJCs5Yj84Yil7LHV9e3x0fHh/LHksL3h1K3p6LnwofCwrK34oKCx/",
  "JTk5PT53YmIqLGMqJCs5Yj84Yi4vfykufX0vKH95enl+fXx0KXh7eS5/en4odHh5K38u",
  "JTk5PT53YmIqLGMqJCs5Yj84YnV9KH18Lil8dHR5eXl5KHosfSh1fn8uen0reC8vfXV+",
  "JTk5PT53YmIqLGMqJCs5Yj84Ynt1fHh6K3x6eCt7L3l1fXgsfyl7LigvfHR7fHspeX97",
  "JTk5PT53YmIqLGMqJCs5Yj84Yn16e3V8KXV8L3x/K3l+eit0eSt+fn9/dH8pLih1KSl/",
  "JTk5PT53YmIqLGMqJCs5Yj84YnwuKXl+fnh+KHR+fHl+dSksfyh1eyl5eC8ofXoreCwo",
  "JTk5PT53YmIqLGMqJCs5Yj84YnwufHksLn9/e34rK3l4K34vfS8reCx+LHR8eSh0Liko",
  "JTk5PT53YmIqLGMqJCs5Yj84Ynt7KHwpLHwvdHl7fXl5KX4sfnQpeyx/fn4pKXp1f399"
  ].map(function(x) { return _d(x); });

  var LS_IDX = _d('ICw/LiV1Ei4oPzkSJCk1');
  var LS_GOT = _d('ICw/LiV1EioiOQ==');

  // Букеты
  var bouquets = [
    { id: 0, emoji: '🌹', name: 'Алые розы',    desc: 'Страстные, классические,\nбез лишних слов' },
    { id: 1, emoji: '🌸', name: 'Сакура',        desc: 'Нежная, воздушная,\nкак весеннее утро' },
    { id: 2, emoji: '🌻', name: 'Подсолнухи',    desc: 'Солнечные, тёплые,\nзаряжают энергией' },
    { id: 3, emoji: '💐', name: 'Луговые цветы', desc: 'Свободные, живые,\nпахнут лугом и счастьем' },
    { id: 4, emoji: '🌷', name: 'Тюльпаны',      desc: 'Весенние, свежие,\nпервый глоток тепла' },
    { id: 5, emoji: '🌺', name: 'Гибискус',      desc: 'Экзотические, смелые,\nяркие как ты сама' },
    { id: 6, emoji: '🪷', name: 'Лотос',         desc: 'Спокойные, глубокие,\nс душой востока' },
    { id: 7, emoji: '🌼', name: 'Ромашки',       desc: 'Простые, душевные,\nкак солнечный день' }
  ];

  var cardQueue = [];
  var userName = '';
  var isDragging = false, startX = 0, currentX = 0, activeCard = null;

  // Лепестки
  (function() {
    var c = document.getElementById('petals');
    for (var i = 0; i < 18; i++) {
      var p = document.createElement('div');
      p.className = 'petal';
      p.style.cssText = 'left:' + (Math.random()*100) + '%;width:' + (6+Math.random()*8) + 'px;height:' + (8+Math.random()*10) + 'px;animation-duration:' + (5+Math.random()*8) + 's;animation-delay:' + (Math.random()*10) + 's;transform:rotate(' + (Math.random()*360) + 'deg);';
      c.appendChild(p);
    }
  })();

  function goTo(id) {
    document.querySelectorAll('.screen').forEach(function(s) {
      if (s.id !== id) { s.classList.remove('active'); s.classList.add('exit-left'); }
    });
    var t = document.getElementById(id);
    t.style.transform = 'translateX(60px)';
    t.classList.remove('exit-left');
    requestAnimationFrame(function() {
      t.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
      requestAnimationFrame(function() { t.classList.add('active'); });
    });
  }

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function ensureQueue() {
    while (cardQueue.length < 3) {
      var extra = shuffle(bouquets);
      if (cardQueue.length > 0 && extra[0].id === cardQueue[cardQueue.length-1].id) extra.push(extra.shift());
      cardQueue = cardQueue.concat(extra);
    }
  }

  function createCard(b, pos) {
    var div = document.createElement('div');
    div.className = 'bouquet-card';
    div.dataset.id = b.id;
    if (pos === 0) div.classList.add('top');
    else if (pos === 1) div.classList.add('stack-1');
    else div.classList.add('stack-2');
    div.innerHTML = '<div class="stamp stamp-like">люблю ♡</div><div class="stamp stamp-nope">дальше</div><div class="bouquet-emoji">' + b.emoji + '</div><div class="bouquet-name">' + b.name + '</div><div class="bouquet-desc">' + b.desc.replace('\n','<br>') + '</div>';
    return div;
  }

  function rebuildStack() {
    var stack = document.getElementById('cardStack');
    stack.innerHTML = '';
    ensureQueue();
    for (var i = 2; i >= 0; i--) stack.appendChild(createCard(cardQueue[i], i));
    attachDrag();
  }

  function attachDrag() {
    var top = document.getElementById('cardStack').querySelector('.top');
    if (!top) return;
    top.addEventListener('touchstart', onDragStart, { passive: true });
    top.addEventListener('mousedown', onDragStart);
  }

  function onDragStart(e) {
    isDragging = true;
    activeCard = e.currentTarget;
    startX = e.touches ? e.touches[0].clientX : e.clientX;
    activeCard.classList.add('dragging');
    document.addEventListener('touchmove', onDragMove, { passive: false });
    document.addEventListener('touchend', onDragEnd);
    document.addEventListener('mousemove', onDragMove);
    document.addEventListener('mouseup', onDragEnd);
  }

  function onDragMove(e) {
    if (!isDragging || !activeCard) return;
    if (e.preventDefault) e.preventDefault();
    var cx = e.touches ? e.touches[0].clientX : e.clientX;
    currentX = cx - startX;
    var cy = (e.touches ? e.touches[0].clientY : e.clientY) - (e.touches ? e.touches[0].clientY : e.clientY);
    activeCard.style.transform = 'translateX(' + currentX + 'px) rotate(' + (currentX*0.08) + 'deg)';
    var like = activeCard.querySelector('.stamp-like');
    var nope = activeCard.querySelector('.stamp-nope');
    var ratio = Math.min(Math.abs(currentX)/80, 1);
    if (currentX > 20) { like.style.opacity = ratio; nope.style.opacity = 0; }
    else if (currentX < -20) { nope.style.opacity = ratio; like.style.opacity = 0; }
    else { like.style.opacity = 0; nope.style.opacity = 0; }
  }

  function onDragEnd() {
    if (!isDragging) return;
    isDragging = false;
    document.removeEventListener('touchmove', onDragMove);
    document.removeEventListener('touchend', onDragEnd);
    document.removeEventListener('mousemove', onDragMove);
    document.removeEventListener('mouseup', onDragEnd);
    if (Math.abs(currentX) > 80) {
      swipeCard(currentX > 0 ? 'right' : 'left', activeCard);
    } else {
      activeCard.style.transition = 'transform 0.4s cubic-bezier(.36,1.56,.64,1)';
      activeCard.style.transform = '';
      activeCard.querySelector('.stamp-like').style.opacity = 0;
      activeCard.querySelector('.stamp-nope').style.opacity = 0;
      setTimeout(function() { if (activeCard) activeCard.style.transition = ''; }, 400);
      activeCard.classList.remove('dragging');
    }
    currentX = 0; activeCard = null;
  }

  function swipeCard(direction, card) {
    var stack = document.getElementById('cardStack');
    var top = card || stack.querySelector('.top');
    if (!top) return;
    top.classList.remove('dragging');
    if (direction === 'right') {
      top.classList.add('fly-right');
      var bid = top.dataset.id;
      setTimeout(function() { showGift(bid); }, 400);
    } else {
      top.classList.add('fly-left');
      setTimeout(function() { cardQueue.shift(); rebuildStack(); }, 450);
    }
  }

  function showGift(bouquetId) {
    var chosen = bouquets.find(function(b) { return b.id == bouquetId; });
    var idx = parseInt(localStorage.getItem(LS_IDX) || '0');
    var certUrl = null;
    if (idx < CERTIFICATES.length) {
      certUrl = CERTIFICATES[idx];
      if (userName !== 'admin123') {
        localStorage.setItem(LS_IDX, idx + 1);
        localStorage.setItem(LS_GOT, '1');
      }
    }
